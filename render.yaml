# Render Blueprint — optional. Adjust service name and disk if using SQLite persistence.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: hrms-portal
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: INTEGRATION_SECRET
        generateValue: true
      # Set in dashboard (do not commit secrets):
      # GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_OAUTH_REDIRECT_URI,
      # GOOGLE_APPS_SCRIPT_WEBAPP_URL, GOOGLE_SERVICE_ACCOUNT_JSON, DB_PATH, etc.
    # Uncomment after adding a persistent disk in the Render dashboard:
    # disk:
    #   name: hrms-data
    #   mountPath: /data
    #   sizeGB: 1
    # Then set DB_PATH=/data/hrms.sqlite
