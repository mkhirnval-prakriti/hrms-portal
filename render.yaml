# Render Blueprint — https://render.com/docs/blueprint-spec
#
# ONE Web Service: API + React SPA (/app) + legacy portal (/portal). Same origin for sessions.
#
# Persistent disks require a paid instance type (not Free). Adjust `plan` if needed.
services:
  - type: web
    name: hrms-portal
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    disk:
      name: hrms-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "1"
      - key: DB_PATH
        value: /data/hrms.sqlite
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      # Optional: MongoDB not used — app uses SQLite on persistent disk (DB_PATH).
      # - key: MONGO_URI
      #   sync: false
      - key: INTEGRATION_SECRET
        generateValue: true
      - key: GOOGLE_APPS_SCRIPT_WEBAPP_URL
        value: https://script.google.com/macros/s/AKfycbzARaUpHTiKlq37VAzK_4KrvwjE-H7x2tgfOuwFQK2WJUTqa0840LMshKdkx_j3RvmD/exec
      # Add in Render dashboard after first deploy (use your real service URL):
      # GOOGLE_OAUTH_REDIRECT_URI = https://hrms-portal.onrender.com/api/integrations/google/oauth/callback
      # GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
